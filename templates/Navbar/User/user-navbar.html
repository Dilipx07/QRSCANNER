{% load static %}
<header id="header" class="header fixed-top d-flex align-items-center">
  <div class="d-flex align-items-center justify-content-between">
    <a href="{% url 'Cylinder-Stock-Dashboard' %}" class="logo d-flex align-items-center">
      <img src="{% static 'img/cylinder-master-nav-logo.png' %}" alt="Cylinder Master">
    </a>
  </div><!-- End Logo -->

  <div class="search-bar">
    <form class="search-form d-flex align-items-center" method="GET" action="#" role="search" data-page-search-form>
      <input type="text" name="query" placeholder="Search" title="Enter search keyword" autocomplete="off" data-page-search-input>
      <button type="submit" title="Search"><i class="bi bi-search"></i></button>
    </form>
    <span class="btn btn-outline-primary text-bold disabled current-page-chip badge" data-current-page-label>&middot; </span>
    <div class="search-results" data-page-search-results></div>
  </div><!-- End Search Bar -->

  <nav class="header-nav ms-auto">
    <ul class="d-flex align-items-center">
      <li class="nav-item">
        <button type="button" class="connection-status connection-status-slow" data-connection-status aria-label="Checking server connection">
          <span class="connection-status-dot"></span>
          <span class="connection-status-text" data-connection-status-text>Checking</span>
        </button>
      </li>
      <li class="nav-item d-block d-lg-none">
        <a class="nav-link nav-icon search-bar-toggle " href="#">
          <i class="bi bi-search"></i>
        </a>
      </li><!-- End Search Icon-->
    </ul>
  </nav><!-- End Icons Navigation -->
</header>
