<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Cylinder Master | Login</title>
  <meta content="" name="description">
  <meta content="" name="keywords">

  <!-- Favicons -->
  <link href="{% static 'img/cylinder-master-logo.png' %}" rel="icon">
  <link href="{% static 'img/cylinder-master-logo.png' %}" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <!-- Vendor CSS Files -->
  <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/boxicons/css/boxicons.min.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/quill/quill.snow.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/quill/quill.bubble.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/remixicon/remixicon.css' %}" rel="stylesheet">
  <link href="{% static 'vendor/simple-datatables/style.css' %}" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body class="login-page" style="--login-bg-image: url({% static 'img/cylinder-master-login-bg.png' %});">
  <main class="login-main">
    <section class="login-shell">
      <div class="login-brand-panel">
        <div class="login-logo-frame">
          <img src="{% static 'img/cylinder-master-login-logo.png' %}" alt="Cylinder Master logo" class="login-logo">
        </div>
      </div>

      <div class="login-card-panel">
        <div class="login-card">
          <div class="login-card-header">
            <span class="login-kicker">Cylinder Master</span>
            <h1>Sign in</h1>
          </div>

          <form action="{% url 'Login-Auth' %}" method="post" class="row g-3 needs-validation" novalidate>
            {% csrf_token %}
            <div class="col-12">
              <label for="username" class="form-label">Username</label>
              <div class="input-group has-validation login-input-group">
                <span class="input-group-text"><i class="fa fa-user"></i></span>
                <input type="text" name="username" class="form-control" id="username" autocomplete="username" required>
                <div class="invalid-feedback">Please enter your username.</div>
              </div>
            </div>
            <div class="col-12">
              <label for="password" class="form-label">Password</label>
              <div class="input-group has-validation login-input-group">
                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                <input type="password" name="password" class="form-control" id="password" autocomplete="current-password" required>
                <div class="invalid-feedback">Please enter your password.</div>
              </div>
            </div>
            <div class="col-12">
              <button type="submit" class="btn login-submit w-100">Login <i class="fa fa-sign-in"></i></button>
            </div>
          </form>
        </div>

        <p class="login-copyright">
          Copyright © <script>document.write(new Date().getFullYear());</script> Cylinder Master
        </p>
      </div>
    </section>
  </main>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <!-- Vendor JS Files -->
  <script src="{% static 'vendor/apexcharts/apexcharts.min.js' %}"></script>
  <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'vendor/chart.js/chart.umd.js' %}"></script>
  <script src="{% static 'vendor/echarts/echarts.min.js' %}"></script>
  <script src="{% static 'vendor/quill/quill.js' %}"></script>
  <script src="{% static 'vendor/simple-datatables/simple-datatables.js' %}"></script>
  <script src="{% static 'vendor/tinymce/tinymce.min.js' %}"></script>
  <script src="{% static 'vendor/php-email-form/validate.js' %}"></script>
  <!-- Template Main JS File -->
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
